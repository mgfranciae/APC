<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>APC Software - Distortion & Sync Fix</title>
    <style>
        :root { --bg: #222; --fg: #eee; --accent: #ff8c00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        h1 { margin: 15px 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { display: flex; gap: 20px; padding: 10px; width: 100%; max-width: 1300px; flex-wrap: wrap; justify-content: center; }
        .panel { background: #333; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* SECUENCIADOR Y SLIDERS LARGOS */
        .seq-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 15px; }
        .step-container { 
            display: flex; flex-direction: column; align-items: center; background: #444; 
            padding: 10px; border-radius: 6px; transition: all 0.1s;
        }
        .step-container.active { background: #555; box-shadow: 0 0 15px var(--accent); transform: scale(1.02); }
        
        /* Sliders VERTICALES LARGOS (300px) */
        input[type=range].slider-vertical { 
            writing-mode: vertical-lr; direction: rtl; 
            width: 30px; height: 300px; /* AUMENTADO A 300px */
            background: transparent; cursor: pointer; margin: 10px 0;
        }
        input[type=range]::-webkit-slider-runnable-track { background: #222; height: 10px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { margin-top: -2px; height: 20px; width: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid #fff; }

        .note-label { font-weight: bold; font-size: 1.1rem; color: var(--accent); min-height: 1.5em; text-align: center; }
        .value-label { font-size: 0.7rem; color: #aaa; margin-bottom: 5px; }
        .step-num { font-size: 0.8rem; margin-bottom: 5px; font-weight: bold; }
        .switch-checkbox { margin-top: 8px; transform: scale(1.3); cursor: pointer; }

        /* Controles */
        .controls-panel { display: flex; flex-direction: column; gap: 15px; width: 220px; }
        label { font-size: 0.8rem; color: #aaa; display: block; margin-bottom: 3px; }
        select, input[type=number], button { background: #222; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box;}
        
        /* Sintetizador y Master */
        .synth-panel { display: flex; flex-direction: column; gap: 12px; width: 200px; }
        .knob-row { display: flex; justify-content: space-between; align-items: center; }
        
        /* Estilo especial para Master */
        .master-volume { background: #444; padding: 10px; border-radius: 5px; border: 1px solid var(--accent); margin-top: 10px; }
        .master-volume input { width: 100%; }

        /* Frases */
        .phrase-manager { width: 100%; max-width: 700px; margin-top: 10px; }
        .phrase-nav { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px; }
        .phrase-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
        .phrase-btn { background: #444; border: 1px solid #666; color: white; padding: 12px; cursor: pointer; border-radius: 4px; }
        .phrase-btn.active { background: var(--accent); color: black; font-weight: bold; }
        .phrase-btn:disabled { background: #222; color: #444; cursor: default; }
        .nav-btn { background: transparent; border: 2px solid var(--accent); color: var(--accent); font-weight: bold; font-size: 1.2rem; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        
        /* Transporte */
        .transport { display: flex; gap: 15px; justify-content: center; margin-top: 20px; align-items: center; }
        .btn-play { background: #4CAF50; color: white; font-weight: bold; padding: 12px 40px; font-size: 1.1rem; border: none; border-radius: 4px; cursor: pointer;}
        .btn-stop { background: #f44336; color: white; font-weight: bold; padding: 12px 40px; font-size: 1.1rem; border: none; border-radius: 4px; cursor: pointer;}
        
        .sync-status { font-size: 0.8rem; padding: 5px 10px; background: #111; border-radius: 4px; border: 1px solid #555; }
        .sync-status.active { color: #0f0; border-color: #0f0; box-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>

    <h1>Atari Punk Sequencer</h1>
    <div class="sync-status" id="syncIndicator">SYNC: LOCALSTORAGE MODE</div>

    <!-- FRASES -->
    <div class="panel phrase-manager">
        <div style="text-align:center; font-weight:bold; margin-bottom:5px;">MODO: <span id="currentMode">EDICIÓN</span></div>
        <div class="phrase-nav">
            <button class="nav-btn" id="prevPage" disabled>&#9664;</button>
            <div style="background:#222; padding: 5px 10px; border-radius:4px;">Frases: <span id="phraseCountDisplay">1</span></div>
            <button class="nav-btn" id="nextPage" disabled>&#9654;</button>
        </div>
        <div class="phrase-grid" id="phraseButtons"></div>
        <div style="display:flex; gap:10px; margin-top:10px; justify-content:center;">
            <button id="addPhraseBtn">+ Añadir Frase</button>
            <button id="delPhraseBtn" style="color:salmon;">- Borrar Frase</button>
        </div>
    </div>

    <div class="container">
        <!-- SECUENCIADOR -->
        <div class="panel">
            <div class="seq-grid" id="sequencerUI"></div>
        </div>

        <!-- CONTROLES GLOBALES -->
        <div class="panel controls-panel">
            <div>
                <label>Rango de Octavas</label>
                <select id="octaveRange">
                    <option value="0">1-2 (Grave)</option><option value="1">2-3</option>
                    <option value="2" selected>3 (Central)</option><option value="3">4-5 (Agudo)</option>
                </select>
            </div>
            <div>
                <label>Dirección</label>
                <select id="direction">
                    <option value="up">Cuenta Arriba</option><option value="down">Cuenta Abajo</option>
                </select>
            </div>
            <div>
                <label>Tempo (BPM)</label>
                <input type="number" id="tempo" value="120" min="40" max="300">
            </div>
        </div>

        <!-- SINTETIZADOR Y EFECTOS -->
        <div class="panel synth-panel">
            <label style="text-align:center; border-bottom:1px solid #555; padding-bottom:5px;">MEZCLADOR</label>
            <div class="knob-row"><label>Cuadrada</label><input type="range" id="mixSq" max="1" step="0.1" value="0.8"></div>
            <div class="knob-row"><label>Sierra</label><input type="range" id="mixSaw" max="1" step="0.1" value="0"></div>
            <div class="knob-row"><label>Triangular</label><input type="range" id="mixTri" max="1" step="0.1" value="0"></div>
            <div class="knob-row"><label>Ruido</label><input type="range" id="mixNoise" max="1" step="0.1" value="0"></div>
            
            <label style="text-align:center; margin-top:15px; border-bottom:1px solid #555; padding-bottom:5px;">EFECTOS</label>
            
            <!-- NUEVO: DISTORSION -->
            <div class="knob-row"><label>Distortion</label><input type="range" id="distortionAmount" min="0" max="100" value="0"></div>
            
            <div class="knob-row"><label>Filtro (LP)</label><input type="range" id="filterFreq" min="100" max="5000" value="5000"></div>
            <div class="knob-row"><label>Reverb</label><input type="range" id="reverbMix" max="1" step="0.1" value="0.2"></div>
            <div class="knob-row"><label>Echo</label><input type="range" id="delayMix" max="1" step="0.1" value="0"></div>

            <!-- NUEVO: MASTER VOLUME -->
            <div class="master-volume">
                <label>MASTER VOLUME</label>
                <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
    </div>

    <div class="transport">
        <button class="btn-play" id="playBtn">▶ PLAY</button>
        <button class="btn-stop" id="stopBtn">■ STOP</button>
    </div>

    <script>
        // ========== MOTOR DE AUDIO ==========
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Nodos
        const masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5;
        const filterNode = audioCtx.createBiquadFilter(); filterNode.type = "lowpass";
        const delayNode = audioCtx.createDelay(1.0);
        const delayGain = audioCtx.createGain();
        const reverbGain = audioCtx.createGain();
        
        // NUEVO: Nodos de Distorsión
        const distortionNode = audioCtx.createWaveShaper();
        distortionNode.oversample = '4x'; // Mejor calidad de distorsión
        
        // Función para crear la curva de distorsión
        function makeDistortionCurve(amount) {
            const k = amount;
            const n_samples = 44100;
            const curve = new Float32Array(n_samples);
            const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) {
                const x = (i * 2) / n_samples - 1;
                curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
            }
            return curve;
        }

        // Conexiones (Routing)
        // Osciladores -> Mezclador -> Distorsión -> Filtro -> Delay/Reverb -> MasterGain -> Salida
        
        // Primero conectamos la salida del mezclador (que se conecta dinámicamente en playNote) a la distorsión
        // Nota: En playNote conectamos al 'masterGain', así que la cadena empieza ahí.
        
        masterGain.connect(distortionNode); // Master -> Dist
        distortionNode.connect(filterNode); // Dist -> Filter
        
        filterNode.connect(audioCtx.destination); // Filter -> Out (Dry)
        
        filterNode.connect(delayNode); // Delay Loop
        delayNode.connect(delayGain);
        delayGain.connect(audioCtx.destination);
        delayGain.connect(delayNode);
        delayNode.delayTime.value = 0.3;
        delayGain.gain.value = 0;

        // Reverb
        const convolver = audioCtx.createConvolver();
        function createReverbImpulse() {
            const rate = audioCtx.sampleRate, length = rate * 2;
            const impulse = audioCtx.createBuffer(2, length, rate);
            for (let ch = 0; ch < 2; ch++){
                const data = impulse.getChannelData(ch);
                for (let i = 0; i < length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
            }
            return impulse;
        }
        convolver.buffer = createReverbImpulse();
        filterNode.connect(convolver);
        convolver.connect(reverbGain);
        reverbGain.connect(audioCtx.destination);

        // Buffer Ruido
        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) noiseData[i] = Math.random() * 2 - 1;

        function playNote(baseFreq) {
            if (baseFreq === 0) return;
            const now = audioCtx.currentTime;
            const env = audioCtx.createGain();
            env.connect(masterGain); // Conectamos al inicio de la cadena de efectos
            env.gain.setValueAtTime(0, now);
            env.gain.linearRampToValueAtTime(1, now + 0.01);
            env.gain.linearRampToValueAtTime(0, now + 0.2);

            const sq = audioCtx.createOscillator(); sq.type = 'square'; sq.frequency.value = baseFreq;
            const saw = audioCtx.createOscillator(); saw.type = 'sawtooth'; saw.frequency.value = baseFreq;
            const tri = audioCtx.createOscillator(); tri.type = 'triangle'; tri.frequency.value = baseFreq;
            
            const mixSq = audioCtx.createGain(); mixSq.gain.value = document.getElementById('mixSq').value;
            const mixSaw = audioCtx.createGain(); mixSaw.gain.value = document.getElementById('mixSaw').value;
            const mixTri = audioCtx.createGain(); mixTri.gain.value = document.getElementById('mixTri').value;

            sq.connect(mixSq).connect(env);
            saw.connect(mixSaw).connect(env);
            tri.connect(mixTri).connect(env);

            const noiseSrc = audioCtx.createBufferSource(); noiseSrc.buffer = noiseBuffer;
            const mixNoise = audioCtx.createGain(); mixNoise.gain.value = document.getElementById('mixNoise').value;
            noiseSrc.connect(mixNoise).connect(env);

            sq.start(now); saw.start(now); tri.start(now); noiseSrc.start(now);
            sq.stop(now + 0.3); saw.stop(now + 0.3); tri.stop(now + 0.3); noiseSrc.stop(now + 0.3);
        }

        // ========== SINCRONÍA (USANDO LOCALSTORAGE) ==========
        // Este método es más compatible que BroadcastChannel para navegadores estrictos
        window.addEventListener('storage', (e) => {
            if (e.key === 'apc_sync_command') {
                const data = JSON.parse(e.newValue);
                const syncInd = document.getElementById('syncIndicator');
                syncInd.innerText = "SYNC: ACTIVO";
                syncInd.classList.add('active');
                setTimeout(() => syncInd.classList.remove('active'), 200);

                if (data.cmd === 'play') startPlayback(true);
                if (data.cmd === 'stop') stopPlayback(true);
                if (data.cmd === 'tempo') document.getElementById('tempo').value = data.val;
            }
        });

        function sendSync(cmd, val = null) {
            localStorage.setItem('apc_sync_command', JSON.stringify({ cmd: cmd, val: val, t: Date.now() }));
        }

        // ========== DATOS ==========
        let song = { phrases: [createEmptyPhrase()] };
        let currentPhraseIndex = 0;
        let pageOffset = 0;

        function createEmptyPhrase() {
            return Array(8).fill(null).map(() => ({ value: 500, enabled: true }));
        }

        // ========== LÓGICA MUSICAL ==========
        const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        function getMusicalInfo(sliderValue, octaveSetting) {
            if(sliderValue === 0) return { note: "---", freq: 0 };
            const octaveMap = { 0: 24, 1: 36, 2: 48, 3: 60 };
            let baseMidi = octaveMap[octaveSetting];
            let semitones = Math.round((sliderValue / 1000) * 24); 
            let finalMidi = baseMidi + semitones;
            let noteName = noteNames[finalMidi % 12];
            let noteOctave = Math.floor(finalMidi / 12) - 1;
            let freq = 440 * Math.pow(2, (finalMidi - 69) / 12.0);
            return { note: noteName + noteOctave, freq: freq };
        }

        // ========== SECUENCIADOR LÓGICA ==========
        let isPlaying = false;
        let stepIndex = 0;
        let nextStepTime = 0;
        const lookahead = 25.0;
        let timerID = null;

        function scheduler() {
            while (nextStepTime < audioCtx.currentTime + 0.1) {
                scheduleNote(stepIndex, nextStepTime);
                nextStep();
            }
            timerID = setTimeout(scheduler, lookahead);
        }

        function scheduleNote(stepNum, time) {
            const phrase = song.phrases[currentPhraseIndex];
            const stepData = phrase[stepNum];
            setTimeout(() => updateStepUI(stepNum), (time - audioCtx.currentTime) * 1000);
            if (!stepData.enabled) return;
            const octaveSel = parseInt(document.getElementById('octaveRange').value);
            const info = getMusicalInfo(stepData.value, octaveSel);
            playNote(info.freq);
        }

        function nextStep() {
            const tempo = parseInt(document.getElementById('tempo').value);
            nextStepTime += (60.0 / tempo);
            const dir = document.getElementById('direction').value;
            if (dir === 'up') {
                stepIndex = (stepIndex + 1) % 8;
            } else {
                stepIndex = (stepIndex - 1 + 8) % 8;
            }
        }

        // ========== UI RENDER ==========
        function updateStepDisplay(index, value) {
            const octaveSel = parseInt(document.getElementById('octaveRange').value);
            const info = getMusicalInfo(value, octaveSel);
            const noteLabel = document.getElementById(`note-${index}`);
            const valueLabel = document.getElementById(`val-${index}`);
            if(noteLabel) noteLabel.innerText = info.note;
            if(valueLabel) valueLabel.innerText = value;
        }

        function updateAllDisplays() {
            const phrase = song.phrases[currentPhraseIndex];
            for(let i=0; i<8; i++) updateStepDisplay(i, phrase[i].value);
        }

        function renderSequencer() {
            const ui = document.getElementById('sequencerUI'); ui.innerHTML = '';
            const phrase = song.phrases[currentPhraseIndex];
            for (let i = 0; i < 8; i++) {
                const step = phrase[i];
                const div = document.createElement('div');
                div.className = 'step-container';
                div.id = `step-container-${i}`;
                
                const num = document.createElement('div'); num.className = 'step-num'; num.innerText = i + 1;
                const input = document.createElement('input'); input.type = 'range'; input.min = 0; input.max = 1000; input.value = step.value; input.className = 'slider-vertical';
                input.oninput = (e) => { step.value = parseInt(e.target.value); updateStepDisplay(i, step.value); };
                
                const noteLbl = document.createElement('div'); noteLbl.className = 'note-label'; noteLbl.id = `note-${i}`;
                const valLbl = document.createElement('div'); valLbl.className = 'value-label'; valLbl.id = `val-${i}`;
                const sw = document.createElement('input'); sw.type = 'checkbox'; sw.className = 'switch-checkbox'; sw.checked = step.enabled;
                sw.onchange = (e) => step.enabled = e.target.checked;
                
                div.appendChild(num); div.appendChild(input); div.appendChild(noteLbl); div.appendChild(valLbl); div.appendChild(sw);
                ui.appendChild(div);
                updateStepDisplay(i, step.value);
            }
        }

        function updateStepUI(activeIndex) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            const el = document.getElementById(`step-container-${activeIndex}`);
            if(el) el.classList.add('active');
        }

        function renderPhraseButtons() {
            const container = document.getElementById('phraseButtons'); container.innerHTML = '';
            const totalPhrases = song.phrases.length;
            const maxPage = Math.floor((totalPhrases - 1) / 8);
            document.getElementById('prevPage').disabled = pageOffset <= 0;
            document.getElementById('nextPage').disabled = pageOffset >= maxPage;
            for(let i = 0; i < 8; i++) {
                const realIndex = pageOffset * 8 + i;
                const btn = document.createElement('button'); btn.className = 'phrase-btn'; btn.innerText = realIndex + 1;
                if (realIndex < totalPhrases) {
                    btn.disabled = false;
                    if (realIndex === currentPhraseIndex) btn.classList.add('active');
                    btn.onclick = () => selectPhrase(realIndex);
                } else { btn.disabled = true; }
                container.appendChild(btn);
            }
            document.getElementById('phraseCountDisplay').innerText = totalPhrases;
        }

        function selectPhrase(index) {
            currentPhraseIndex = index;
            renderSequencer();
            renderPhraseButtons();
        }

        // Listeners Efectos
        document.getElementById('filterFreq').oninput = (e) => filterNode.frequency.value = e.target.value;
        document.getElementById('delayMix').oninput = (e) => delayGain.gain.value = e.target.value;
        document.getElementById('reverbMix').oninput = (e) => reverbGain.gain.value = e.target.value;
        
        // NUEVO: Distortion Listener
        document.getElementById('distortionAmount').oninput = (e) => {
            const val = parseInt(e.target.value);
            if (val === 0) distortionNode.curve = null; // Sin distorsión
            else distortionNode.curve = makeDistortionCurve(val);
        };

        // NUEVO: Master Volume Listener
        document.getElementById('masterVolume').oninput = (e) => {
            masterGain.gain.value = e.target.value;
        };

        document.getElementById('octaveRange').onchange = updateAllDisplays;
        document.getElementById('tempo').onchange = (e) => sendSync('tempo', e.target.value);

        // ========== CONTROLES MAIN ==========
        function startPlayback(isRemote = false) {
            if (isPlaying) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            isPlaying = true;
            nextStepTime = audioCtx.currentTime;
            scheduler();
            document.getElementById('currentMode').innerText = "REPRODUCCIÓN";
            
            if(!isRemote) sendSync('play');
        }

        function stopPlayback(isRemote = false) {
            isPlaying = false;
            clearTimeout(timerID);
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById('currentMode').innerText = "EDICIÓN";
            
            if(!isRemote) sendSync('stop');
        }

        document.getElementById('playBtn').onclick = () => startPlayback();
        document.getElementById('stopBtn').onclick = () => stopPlayback();

        document.getElementById('addPhraseBtn').onclick = () => {
            song.phrases.push(createEmptyPhrase());
            const newPage = Math.floor((song.phrases.length - 1) / 8);
            pageOffset = newPage;
            selectPhrase(song.phrases.length - 1);
        };

        document.getElementById('delPhraseBtn').onclick = () => {
            if(song.phrases.length > 1) {
                song.phrases.splice(currentPhraseIndex, 1);
                if(currentPhraseIndex >= song.phrases.length) currentPhraseIndex = song.phrases.length - 1;
                renderSequencer();
                renderPhraseButtons();
            }
        };

        document.getElementById('prevPage').onclick = () => { pageOffset--; renderPhraseButtons(); };
        document.getElementById('nextPage').onclick = () => { pageOffset++; renderPhraseButtons(); };

        // Init
        renderSequencer();
        renderPhraseButtons();

    </script>
</body>
</html>
