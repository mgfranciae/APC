<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>APC Software - Pitch & Steps</title>
    <style>
        :root { --bg: #222; --fg: #eee; --accent: #ff8c00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        h1 { margin: 10px 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { display: flex; gap: 15px; padding: 10px; width: 100%; max-width: 1400px; flex-wrap: wrap; justify-content: center; }
        .panel { background: #333; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        /* SECUENCIADOR */
        .seq-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
        .step-container { display: flex; flex-direction: column; align-items: center; background: #444; padding: 8px; border-radius: 6px; }
        .step-container.active { background: #555; box-shadow: 0 0 15px var(--accent); }
        .step-container.disabled-step { opacity: 0.2; pointer-events: none; } /* Para pasos fuera del rango */
        
        input[type=range].slider-vertical { writing-mode: vertical-lr; direction: rtl; width: 30px; height: 160px; background: transparent; cursor: pointer; margin: 5px 0; }
        input[type=range]::-webkit-slider-runnable-track { background: #222; height: 8px; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { margin-top: -3px; height: 16px; width: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; }

        .note-label { font-weight: bold; font-size: 0.9rem; color: var(--accent); }
        .switch-checkbox { margin-top: 5px; transform: scale(1.2); cursor: pointer; }

        /* CONTROLES */
        .controls-panel { display: flex; flex-direction: column; gap: 8px; width: 200px; }
        label { font-size: 0.75rem; color: #aaa; display: block; margin-bottom: 2px; }
        select, input[type=number] { background: #222; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; width: 100%; box-sizing: border-box;}
        
        /* PITCH BEND */
        .pitch-bend-container { background: #444; padding: 10px; border-radius: 5px; margin-top: 5px; }
        .pitch-bend-container input[type=range] { width: 100%; writing-mode: horizontal-tb; direction: ltr; } /* Forzar horizontal */

        /* SINTETIZADOR */
        .synth-panel { display: flex; flex-direction: column; gap: 6px; width: 200px; }
        .knob-row { display: flex; justify-content: space-between; align-items: center; }
        
        .adsr-section { background: #444; padding: 8px; border-radius: 5px; margin-top: 5px; border: 1px dashed #666; }
        .adsr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        /* TRANSPORTE */
        .transport { display: flex; gap: 10px; justify-content: center; margin-top: 15px; align-items: center; }
        .btn-play { background: #4CAF50; color: white; font-weight: bold; padding: 10px 25px; border: none; border-radius: 4px; cursor: pointer;}
        .btn-stop { background: #f44336; color: white; font-weight: bold; padding: 10px 25px; border: none; border-radius: 4px; cursor: pointer;}
        .btn-reset { background: #555; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; border: 1px solid #777;}
        
        .master-volume { border: 1px solid var(--accent); padding: 5px; border-radius: 4px; margin-top: auto; }

        /* Frases */
        .phrase-manager { width: 100%; max-width: 600px; margin-bottom: 10px; }
        .phrase-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
        .phrase-btn { background: #444; border: 1px solid #666; color: white; padding: 8px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }
        .phrase-btn.active { background: var(--accent); color: black; font-weight: bold; }
        .phrase-btn:disabled { background: #222; color: #444; }
    </style>
</head>
<body>

    <h1>APC Software - Ultimate</h1>

    <!-- FRASES -->
    <div class="panel phrase-manager">
        <div style="display:flex; justify-content:center; gap:10px; align-items:center; margin-bottom:10px;">
            <button class="nav-btn" id="prevPage" style="width:30px; height:30px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer;" disabled>&#9664;</button>
            <span>Frases: <span id="phraseCountDisplay">1</span></span>
            <button class="nav-btn" id="nextPage" style="width:30px; height:30px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer;" disabled>&#9654;</button>
            <button id="addPhraseBtn" style="margin-left:10px; padding: 5px 10px; cursor:pointer;">+ Añadir</button>
        </div>
        <div class="phrase-grid" id="phraseButtons"></div>
    </div>

    <div class="container">
        <!-- SECUENCIADOR -->
        <div class="panel">
            <div class="seq-grid" id="sequencerUI"></div>
        </div>

        <!-- CONTROLES GLOBALES -->
        <div class="panel controls-panel">
            <div>
                <label>Octavas</label>
                <select id="octaveRange">
                    <option value="0">1-2 (Grave)</option><option value="1">2-3</option>
                    <option value="2" selected>3 (Central)</option><option value="3">4-5 (Agudo)</option>
                </select>
            </div>
            <div>
                <label>Tempo (BPM)</label>
                <input type="number" id="tempo" value="120" min="40" max="300">
            </div>
            <div>
                <label>Dirección</label>
                <select id="direction">
                    <option value="up">Cuenta Arriba</option>
                    <option value="down">Cuenta Abajo</option>
                </select>
            </div>
            
            <!-- NUEVO: Numero de Pasos -->
            <div>
                <label>Pasos por Frase (2-8)</label>
                <select id="stepCount">
                    <option value="2">2 Pasos</option>
                    <option value="3">3 Pasos</option>
                    <option value="4">4 Pasos</option>
                    <option value="5">5 Pasos</option>
                    <option value="6">6 Pasos</option>
                    <option value="7">7 Pasos</option>
                    <option value="8" selected>8 Pasos</option>
                </select>
            </div>

            <!-- NUEVO: Pitch Bend -->
            <div class="pitch-bend-container">
                <label>PITCH BEND (Fijo)</label>
                <input type="range" id="pitchBend" min="0" max="1000" value="500">
            </div>

            <!-- ADSR -->
            <div class="adsr-section">
                <label style="text-align:center; color:var(--accent);">ENVELOPE</label>
                <div class="adsr-grid">
                    <div><label>Attack</label><input type="range" id="atk" min="0" max="1" step="0.01" value="0.01"></div>
                    <div><label>Decay</label><input type="range" id="dec" min="0" max="1" step="0.01" value="0.1"></div>
                    <div><label>Sustain</label><input type="range" id="sus" min="0" max="1" step="0.01" value="0.5"></div>
                    <div><label>Release</label><input type="range" id="rel" min="0" max="1" step="0.01" value="0.1"></div>
                </div>
            </div>
        </div>

        <!-- SINTETIZADOR -->
        <div class="panel synth-panel">
            <label style="text-align:center; border-bottom:1px solid #555;">MEZCLADOR</label>
            <div class="knob-row"><label>Cuadrada</label><input type="range" id="mixSq" max="1" step="0.1" value="0.6"></div>
            <div class="knob-row"><label>Sierra</label><input type="range" id="mixSaw" max="1" step="0.1" value="0"></div>
            <div class="knob-row"><label>Triangular</label><input type="range" id="mixTri" max="1" step="0.1" value="0"></div>
            <!-- Valor por defecto de Senoidal subido para que se escuche -->
            <div class="knob-row"><label>Senoidal</label><input type="range" id="mixSin" max="1" step="0.1" value="0.4"></div> 
            <div class="knob-row"><label>Ruido</label><input type="range" id="mixNoise" max="1" step="0.1" value="0"></div>

            <label style="text-align:center; margin-top:10px; border-bottom:1px solid #555;">EFECTOS</label>
            <div class="knob-row"><label>Distortion</label><input type="range" id="distortionAmount" min="0" max="100" value="0"></div>
            <div class="knob-row"><label>Filtro (LP)</label><input type="range" id="filterFreq" min="100" max="5000" value="5000"></div>
            <div class="knob-row"><label>Reverb</label><input type="range" id="reverbMix" max="1" step="0.1" value="0.2"></div>
            <div class="knob-row"><label>Echo</label><input type="range" id="delayMix" max="1" step="0.1" value="0"></div>

            <div class="master-volume">
                <label>MASTER VOL</label>
                <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
    </div>

    <div class="transport">
        <button class="btn-reset" id="resetBtn">⟲ RESET</button>
        <button class="btn-play" id="playBtn">▶ PLAY</button>
        <button class="btn-stop" id="stopBtn">■ STOP</button>
    </div>

    <script>
        // ========== MOTOR DE AUDIO ==========
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Nodos
        const masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5;
        const filterNode = audioCtx.createBiquadFilter(); filterNode.type = "lowpass";
        const distortionNode = audioCtx.createWaveShaper();
        
        const delayNode = audioCtx.createDelay(2.0);
        const delayGain = audioCtx.createGain();
        delayNode.delayTime.value = 0.3;
        delayGain.gain.value = 0;

        const convolver = audioCtx.createConvolver();
        const reverbGain = audioCtx.createGain();
        function createReverbImpulse() {
            const rate = audioCtx.sampleRate, length = rate * 2;
            const impulse = audioCtx.createBuffer(2, length, rate);
            for (let ch = 0; ch < 2; ch++){
                const data = impulse.getChannelData(ch);
                for (let i = 0; i < length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
            }
            return impulse;
        }
        convolver.buffer = createReverbImpulse();

        // Routing
        masterGain.connect(distortionNode);
        distortionNode.connect(filterNode);
        filterNode.connect(audioCtx.destination);
        filterNode.connect(delayNode);
        delayNode.connect(delayGain);
        delayGain.connect(audioCtx.destination);
        delayGain.connect(delayNode);
        filterNode.connect(convolver);
        convolver.connect(reverbGain);
        reverbGain.connect(audioCtx.destination);

        function makeDistortionCurve(amount) {
            const k = amount, n_samples = 44100, curve = new Float32Array(n_samples), deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) { const x = (i * 2) / n_samples - 1; curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x)); }
            return curve;
        }
        document.getElementById('distortionAmount').oninput = (e) => distortionNode.curve = parseInt(e.target.value) === 0 ? null : makeDistortionCurve(parseInt(e.target.value));

        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) noiseData[i] = Math.random() * 2 - 1;

        // Función de Reproducción con Pitch Bend
        function playNote(baseFreq) {
            if (baseFreq === 0) return;
            
            // CALCULAR PITCH BEND
            const pbSlider = document.getElementById('pitchBend');
            // Slider 0-1000. Centro 500.
            // Rango: una octava abajo (0.5) a una octava arriba (2.0)
            const pbValue = pbSlider.value / 500; 
            // 0 -> 0, 500 -> 1, 1000 -> 2
            // Fórmula exponencial para que sea musical: 2^(x-1)
            // x=0 -> 0.5 (octava abajo), x=1 -> 1 (centro), x=2 -> 2 (octava arriba)
            const pitchMultiplier = Math.pow(2, pbValue - 1);
            
            const finalFreq = baseFreq * pitchMultiplier;

            const now = audioCtx.currentTime;
            const atk = parseFloat(document.getElementById('atk').value);
            const dec = parseFloat(document.getElementById('dec').value);
            const sus = parseFloat(document.getElementById('sus').value);
            const rel = parseFloat(document.getElementById('rel').value);

            const tempo = parseInt(document.getElementById('tempo').value);
            const stepDuration = (60.0 / tempo);
            const noteOffTime = now + stepDuration * 0.9;

            const env = audioCtx.createGain();
            env.connect(masterGain);
            env.gain.setValueAtTime(0, now);
            env.gain.linearRampToValueAtTime(1, now + atk);
            env.gain.linearRampToValueAtTime(sus, now + atk + dec);
            env.gain.setValueAtTime(sus, noteOffTime);
            env.gain.linearRampToValueAtTime(0, noteOffTime + rel);

            const sq = audioCtx.createOscillator(); sq.type = 'square'; sq.frequency.value = finalFreq;
            const saw = audioCtx.createOscillator(); saw.type = 'sawtooth'; saw.frequency.value = finalFreq;
            const tri = audioCtx.createOscillator(); tri.type = 'triangle'; tri.frequency.value = finalFreq;
            const sin = audioCtx.createOscillator(); sin.type = 'sine'; sin.frequency.value = finalFreq;
            
            // GAIN PARA MEZCLA
            const mixSq = audioCtx.createGain(); mixSq.gain.value = document.getElementById('mixSq').value;
            const mixSaw = audioCtx.createGain(); mixSaw.gain.value = document.getElementById('mixSaw').value;
            const mixTri = audioCtx.createGain(); mixTri.gain.value = document.getElementById('mixTri').value;
            // Doy un pequeño boost a la senoidal en el nodo de ganancia para ayudarla a destacar
            const mixSin = audioCtx.createGain(); mixSin.gain.value = document.getElementById('mixSin').value * 1.5; 

            sq.connect(mixSq).connect(env);
            saw.connect(mixSaw).connect(env);
            tri.connect(mixTri).connect(env);
            sin.connect(mixSin).connect(env);

            const noiseSrc = audioCtx.createBufferSource(); noiseSrc.buffer = noiseBuffer;
            const mixNoise = audioCtx.createGain(); mixNoise.gain.value = document.getElementById('mixNoise').value;
            noiseSrc.connect(mixNoise).connect(env);

            const totalTime = (atk + dec) + stepDuration + rel;
            sq.start(now); saw.start(now); tri.start(now); sin.start(now); noiseSrc.start(now);
            sq.stop(now + totalTime + 0.1); saw.stop(now + totalTime + 0.1); tri.stop(now + totalTime + 0.1); sin.stop(now + totalTime + 0.1); noiseSrc.stop(now + totalTime + 0.1);
        }

        // Listeners
        document.getElementById('filterFreq').oninput = (e) => filterNode.frequency.value = e.target.value;
        document.getElementById('delayMix').oninput = (e) => delayGain.gain.value = e.target.value;
        document.getElementById('reverbMix').oninput = (e) => reverbGain.gain.value = e.target.value;
        document.getElementById('masterVolume').oninput = (e) => masterGain.gain.value = e.target.value;

        // ========== DATOS ==========
        let song = { phrases: [createEmptyPhrase()] };
        let currentPhraseIndex = 0;
        let pageOffset = 0;

        function createEmptyPhrase() { return Array(8).fill(null).map(() => ({ value: 500, enabled: true })); }

        // ========== LÓGICA MUSICAL ==========
        const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        function getMusicalInfo(sliderValue, octaveSetting) {
            const octaveMap = { 0: 24, 1: 36, 2: 48, 3: 60 };
            let baseMidi = octaveMap[octaveSetting];
            let semitones = Math.round((sliderValue / 1000) * 24); 
            let finalMidi = baseMidi + semitones;
            return { note: noteNames[finalMidi % 12] + (Math.floor(finalMidi / 12) - 1), freq: 440 * Math.pow(2, (finalMidi - 69) / 12.0) };
        }

        // ========== SECUENCIADOR ==========
        let isPlaying = false;
        let stepIndex = 0;
        let nextStepTime = 0;
        let timerID = null;

        function scheduler() {
            while (nextStepTime < audioCtx.currentTime + 0.1) {
                scheduleNote(stepIndex, nextStepTime);
                nextStep();
            }
            timerID = setTimeout(scheduler, 25.0);
        }

        function scheduleNote(stepNum, time) {
            const phrase = song.phrases[currentPhraseIndex];
            const stepData = phrase[stepNum];
            
            setTimeout(() => {
                if(isPlaying) updateStepUI(stepNum);
            }, (time - audioCtx.currentTime) * 1000);

            if (!stepData.enabled) return;

            const octaveSel = parseInt(document.getElementById('octaveRange').value);
            const info = getMusicalInfo(stepData.value, octaveSel);
            playNote(info.freq);
        }

        function nextStep() {
            const tempo = parseInt(document.getElementById('tempo').value);
            nextStepTime += (60.0 / tempo);
            const dir = document.getElementById('direction').value;
            
            // OBTENER NUMERO DE PASOS
            const maxSteps = parseInt(document.getElementById('stepCount').value);

            if (dir === 'up') {
                stepIndex = (stepIndex + 1) % maxSteps;
            } else {
                // Lógica invertida
                stepIndex = (stepIndex - 1 + maxSteps) % maxSteps;
            }
        }

        // ========== UI ==========
        function renderSequencer() {
            const ui = document.getElementById('sequencerUI'); ui.innerHTML = '';
            const phrase = song.phrases[currentPhraseIndex];
            const maxSteps = parseInt(document.getElementById('stepCount').value); // Leer selector

            for (let i = 0; i < 8; i++) {
                const step = phrase[i];
                const div = document.createElement('div'); 
                div.className = 'step-container';
                
                // Oscurecer pasos no usados
                if (i >= maxSteps) div.classList.add('disabled-step');
                
                div.id = `step-container-${i}`;
                
                const input = document.createElement('input'); input.type = 'range'; input.min = 0; input.max = 1000; input.value = step.value; input.className = 'slider-vertical';
                input.oninput = (e) => { step.value = parseInt(e.target.value); updateStepDisplay(i); };
                
                const noteLbl = document.createElement('div'); noteLbl.className = 'note-label'; noteLbl.id = `note-${i}`;
                const sw = document.createElement('input'); sw.type = 'checkbox'; sw.className = 'switch-checkbox'; sw.checked = step.enabled;
                sw.onchange = (e) => step.enabled = e.target.checked;
                
                div.appendChild(input); div.appendChild(noteLbl); div.appendChild(sw);
                ui.appendChild(div);
                updateStepDisplay(i);
            }
        }

        // Actualizar el grid si cambio el numero de pasos
        document.getElementById('stepCount').onchange = () => {
            stepIndex = 0; // Resetear indice para evitar errores fuera de rango
            renderSequencer();
        };

        function updateStepDisplay(index) {
            const phrase = song.phrases[currentPhraseIndex];
            const info = getMusicalInfo(phrase[index].value, parseInt(document.getElementById('octaveRange').value));
            const el = document.getElementById(`note-${index}`);
            if(el) el.innerText = info.note;
        }

        function updateStepUI(activeIndex) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            const el = document.getElementById(`step-container-${activeIndex}`);
            if(el) el.classList.add('active');
        }

        function renderPhraseButtons() {
            const container = document.getElementById('phraseButtons'); container.innerHTML = '';
            const totalPhrases = song.phrases.length;
            const maxPage = Math.floor((totalPhrases - 1) / 8);
            document.getElementById('prevPage').disabled = pageOffset <= 0;
            document.getElementById('nextPage').disabled = pageOffset >= maxPage;
            for(let i = 0; i < 8; i++) {
                const realIndex = pageOffset * 8 + i;
                const btn = document.createElement('button'); btn.className = 'phrase-btn'; btn.innerText = realIndex + 1;
                if (realIndex < totalPhrases) {
                    btn.disabled = false;
                    if (realIndex === currentPhraseIndex) btn.classList.add('active');
                    btn.onclick = () => { currentPhraseIndex = realIndex; renderSequencer(); renderPhraseButtons(); };
                } else { btn.disabled = true; }
                container.appendChild(btn);
            }
            document.getElementById('phraseCountDisplay').innerText = totalPhrases;
        }

        // ========== CONTROLES TRANSPORTE ==========
        function startPlayback() {
            if (isPlaying) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isPlaying = true;
            nextStepTime = audioCtx.currentTime;
            scheduler();
        }
        function stopPlayback() {
            isPlaying = false;
            clearTimeout(timerID);
        }
        function resetSequencer() {
            stepIndex = 0;
            updateStepUI(0);
        }

        document.getElementById('playBtn').onclick = startPlayback;
        document.getElementById('stopBtn').onclick = stopPlayback;
        document.getElementById('resetBtn').onclick = resetSequencer;
        
        document.getElementById('addPhraseBtn').onclick = () => {
            song.phrases.push(createEmptyPhrase());
            const newPage = Math.floor((song.phrases.length - 1) / 8);
            pageOffset = newPage;
            currentPhraseIndex = song.phrases.length - 1;
            renderSequencer();
            renderPhraseButtons();
        };

        document.getElementById('prevPage').onclick = () => { pageOffset--; renderPhraseButtons(); };
        document.getElementById('nextPage').onclick = () => { pageOffset++; renderPhraseButtons(); };

        // Init
        renderSequencer();
        renderPhraseButtons();

    </script>
</body>
</html>
